name: cardshield

x-cardshield-environment: &cardshield-environment
  CARDSHIELD_PROJECT_ROOT: /app
  CARDSHIELD_KAFKA_BOOTSTRAP_SERVERS: kafka:19092
  CARDSHIELD_KAFKA_INPUT_TOPIC: transactions.v1
  CARDSHIELD_KAFKA_DEAD_LETTER_TOPIC: transactions.dlq.v1
  CARDSHIELD_CASSANDRA_HOSTS: cassandra
  CARDSHIELD_CASSANDRA_PORT: "9042"
  CARDSHIELD_CASSANDRA_KEYSPACE: bigdata
  CARDSHIELD_CASSANDRA_LOCAL_DC: datacenter1
  CARDSHIELD_MODEL_PATH: /app/models/fraud_pipeline
  CARDSHIELD_ENCODER_PATH: /app/models/encoders/categories-v1.json
  CARDSHIELD_LEGACY_ENCODER_PATH: /app/models/encoders/LE_model_v1.pkl
  CARDSHIELD_MODEL_VERSION: ${CARDSHIELD_MODEL_VERSION:-local-v1}
  CARDSHIELD_REPLAY_PATH: /app/data/clean_test.csv
  CARDSHIELD_CHECKPOINT_PATH: /app/runtime/checkpoints/fraud-scorer

x-cardshield-service: &cardshield-service
  build:
    context: .
  environment: *cardshield-environment
  volumes:
    - ./models:/app/models:ro
    - ./data:/app/data:ro
    - cardshield-runtime:/app/runtime

services:
  kafka:
    image: apache/kafka:4.2.0
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: CONTROLLER://:9093,PLAINTEXT://:19092,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    ports:
      - "9092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:19092 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  kafka-init:
    image: apache/kafka:4.2.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic transactions.v1 --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic transactions.dlq.v1 --partitions 1 --replication-factor 1
    restart: "no"

  cassandra:
    image: cassandra:5.0
    environment:
      CASSANDRA_CLUSTER_NAME: CardShield
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 256M
    ports:
      - "9042:9042"
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE CLUSTER' >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 45s

  migrate:
    <<: *cardshield-service
    command: ["cardshield-migrate"]
    depends_on:
      cassandra:
        condition: service_healthy
    restart: "no"

  scorer:
    <<: *cardshield-service
    command: ["cardshield-score"]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  api:
    <<: *cardshield-service
    command: ["cardshield-api"]
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    build:
      context: ./web
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  producer:
    <<: *cardshield-service
    command: ["cardshield-produce", "--loop"]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    profiles: ["demo"]
    restart: unless-stopped

volumes:
  kafka-data:
  cassandra-data:
  cardshield-runtime:
